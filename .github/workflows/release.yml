name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v2.0.0)'
        required: true

permissions:
  contents: write

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download yt-dlp
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src/bin | Out-Null
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "src/bin/yt-dlp.exe"

      - name: Download ffmpeg
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ffmpeg.zip
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead("ffmpeg.zip")
          $entry = $zip.Entries | Where-Object { $_.Name -eq "ffmpeg.exe" -and $_.FullName -like "*/bin/ffmpeg.exe" } | Select-Object -First 1
          [System.IO.Compression.ZipFileExtensions]::ExtractToFile($entry, "src/bin/ffmpeg.exe", $true)
          $zip.Dispose()
          Remove-Item ffmpeg.zip

      - name: Publish single exe
        run: >
          dotnet publish src/YtDlpGui.csproj -c Release -r win-x64 --self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:IncludeAllContentForSelfExtract=true

      - name: Rename artifact
        shell: pwsh
        run: Copy-Item "src/bin/Release/net8.0/win-x64/publish/YtDlpGui.exe" "yt-dlp-gui-windows-x64.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: yt-dlp-gui-windows-x64.exe

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-15
            rid: osx-arm64
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download yt-dlp
        run: |
          mkdir -p src/bin
          curl -L -o src/bin/yt-dlp "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos"
          chmod +x src/bin/yt-dlp

      - name: Install ffmpeg via brew
        run: |
          brew install --quiet ffmpeg
          cp "$(which ffmpeg)" src/bin/ffmpeg
          chmod +x src/bin/ffmpeg

      - name: Publish
        run: dotnet publish src/YtDlpGui.csproj -c Release -r ${{ matrix.rid }} --self-contained -p:PublishSingleFile=true

      - name: Package tar.gz
        run: |
          cd src/bin/Release/net8.0/${{ matrix.rid }}/publish
          tar -czf "$GITHUB_WORKSPACE/yt-dlp-gui-macos-${{ matrix.arch }}.tar.gz" .

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: yt-dlp-gui-macos-${{ matrix.arch }}.tar.gz

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download yt-dlp
        run: |
          mkdir -p src/bin
          curl -L -o src/bin/yt-dlp "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux"
          chmod +x src/bin/yt-dlp

      - name: Download ffmpeg
        run: |
          curl -L -o ffmpeg.tar.xz "https://github.com/yt-dlp/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz"
          tar -xf ffmpeg.tar.xz --wildcards "*/bin/ffmpeg" --strip-components=2
          mv ffmpeg src/bin/ffmpeg
          chmod +x src/bin/ffmpeg
          rm ffmpeg.tar.xz

      - name: Publish
        run: dotnet publish src/YtDlpGui.csproj -c Release -r linux-x64 --self-contained -p:PublishSingleFile=true

      - name: Package tar.gz
        run: |
          cd src/bin/Release/net8.0/linux-x64/publish
          tar -czf "$GITHUB_WORKSPACE/yt-dlp-gui-linux-x64.tar.gz" .

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: yt-dlp-gui-linux-x64.tar.gz

  release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: YT-DLP GUI ${{ github.event.inputs.version }}
          draft: true
          body: |
            ## Downloads

            | Platform | File | How to run |
            |----------|------|------------|
            | Windows x64 | `yt-dlp-gui-windows-x64.exe` | Just run it |
            | macOS Apple Silicon | `yt-dlp-gui-macos-arm64.tar.gz` | Extract, then run |
            | Linux x64 | `yt-dlp-gui-linux-x64.tar.gz` | Extract, `chmod +x`, then run |

            **Windows** is a single `.exe` — no installer, no extraction. Everything is inside.

            yt-dlp and ffmpeg are bundled on all platforms.
          files: |
            yt-dlp-gui-windows-x64.exe
            yt-dlp-gui-macos-arm64.tar.gz
            yt-dlp-gui-linux-x64.tar.gz
